<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>איתי ראובני – הסכם בין איתי למזמין</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <style>
    /* ─── RESET & ROOT ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0f2647;
      --blue:   #1a3a6b;
      --gold:   #c8a84b;
      --goldlt: #f0d86e;
      --bg:     #0d1c35;
      --white:  #ffffff;
      --offwh:  #f7f8fc;
      --text:   #1e2b3c;
      --muted:  #6b7a8d;
      --border: #dde2ea;
      --radius: 16px;
      --shadow: 0 8px 40px rgba(0,0,0,.22);
    }

    body {
      font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
      background: linear-gradient(160deg, var(--bg) 0%, var(--blue) 100%);
      min-height: 100vh;
      color: var(--text);
      direction: rtl;
    }

    /* ─── HEADER ─── */
    .site-header {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(15,38,71,.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(200,168,75,.25);
    }

    .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
    .logo-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--gold), var(--goldlt));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 14px rgba(200,168,75,.45);
      flex-shrink: 0;
    }
    .logo-title { color: var(--white); font-size: 18px; font-weight: 700; line-height: 1.2; }
    .logo-sub   { color: var(--gold);  font-size: 12px; }

    #backBtn {
      display: inline-block; padding: 8px 22px;
      background: transparent; border: 1.5px solid var(--gold); color: var(--gold);
      border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: .2s;
    }
    #backBtn:hover { background: var(--gold); color: var(--navy); }

    .page { padding: 36px 20px 60px; min-height: calc(100vh - 74px); }

    /* ─── TWO-COLUMN LAYOUT ─── */
    .editor-wrap {
      display: grid;
      grid-template-columns: 370px 1fr;
      gap: 28px;
      max-width: 1220px; margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 880px) {
      .editor-wrap { grid-template-columns: 1fr; }
    }

    /* ─── FORM PANEL ─── */
    .form-panel {
      background: var(--white); border-radius: var(--radius); padding: 28px 24px;
      box-shadow: var(--shadow); position: sticky; top: 88px;
      max-height: calc(100vh - 120px); overflow-y: auto;
    }
    .form-panel > h2 {
      font-size: 1.25rem; color: var(--blue);
      border-bottom: 3px solid var(--gold); padding-bottom: 12px; margin-bottom: 4px;
    }
    .form-panel > .fp-sub { color: var(--muted); font-size: .83rem; margin-bottom: 22px; }

    .sec-title {
      font-size: .73rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
      color: var(--blue); margin: 20px 0 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-title::after { content:''; flex:1; height:1px; background: rgba(26,58,107,.18); }

    .frow { margin-bottom: 12px; }
    .frow label { display:block; font-size:.82rem; font-weight:600; color:#556; margin-bottom:5px; }

    input[type=text], input[type=number], input[type=email], select, textarea {
      width:100%; padding:9px 13px; border:1.5px solid var(--border); border-radius:9px;
      font-family:inherit; font-size:.93rem; color: var(--text); background: var(--offwh);
      direction:rtl; transition:border-color .2s, box-shadow .2s; outline:none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,58,107,.1); background:#fff;
    }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .btn-gen {
      width:100%; margin-top:16px; padding:13px;
      background: linear-gradient(135deg, var(--blue), #2a5298);
      color:#fff; border:none; border-radius:12px;
      font-size:.97rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:9px;
      box-shadow: 0 5px 18px rgba(26,58,107,.32);
      transition:transform .2s, box-shadow .2s;
    }
    .btn-gen:hover  { transform:translateY(-2px); box-shadow:0 8px 28px rgba(26,58,107,.42); }
    .btn-gen:active { transform:none; }

    /* ─── PREVIEW PANEL ─── */
    .preview-panel {
      background: var(--white); border-radius: var(--radius); padding: 26px 28px;
      box-shadow: var(--shadow);
    }
    .preview-top {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:18px; padding-bottom:14px; border-bottom:2px solid #eef0f5;
    }
    .preview-top h3 { color: var(--blue); font-size:1rem; }

    .btn-pdf {
      padding:9px 22px;
      background: linear-gradient(135deg, var(--gold), var(--goldlt));
      color: var(--navy); border:none; border-radius:9px;
      font-size:.9rem; font-weight:700; cursor:pointer;
      box-shadow:0 3px 12px rgba(200,168,75,.35); transition:.2s;
    }
    .btn-pdf:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(200,168,75,.45); }

    /* ─── DOCUMENT STYLE ─── */
    .doc-scroll {
      max-height: 72vh; overflow-y:auto;
      border:1px solid #e8eaf0; border-radius:12px;
    }
    #doc3 {
      direction:rtl;
      font-family: 'David', 'Times New Roman', serif;
      font-size:14px; line-height:1.7; color:#111;
      background:#fff; padding:52px 58px;
    }

    .doc-title { text-align:center; font-size:22px; font-weight:700; text-decoration:underline; margin-bottom:18px; }
    
    .clause { margin-bottom: 8px; text-align: justify; }
    .clause-num { font-weight: 700; margin-left: 6px; }

    .fv { display:inline; color:#111; font-weight:600; padding:0 4px; }
    .fv.empty { color:#bbb; }

    .page-break { margin-top: 40px; margin-bottom: 40px; border-top: 2px dashed #ccc; text-align: center; color: #888; font-size: 11px; padding-top: 10px; page-break-before: always; }

    .sig-table { width: 100%; margin-top: 30px; border-collapse: collapse; }
    .sig-table td { width: 50%; text-align: center; vertical-align: top; padding: 10px; }
    .sig-line { margin-top: 20px; border-top: 1px solid #000; width: 60%; margin-left: auto; margin-right: auto; padding-top: 5px; }

    /* ─── PRINT / PDF ─── */
    @page { margin: 15mm; size: A4; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: white !important; margin: 0; padding: 0; }
      #loginOverlay, .site-header, .form-panel, .preview-top, #backBtn { display: none !important; }
      .page { padding: 0 !important; min-height: unset !important; }
      .editor-wrap { display: block !important; }
      .preview-panel { box-shadow: none !important; border-radius: 0 !important; padding: 0 !important; background: white !important; }
      .doc-scroll { max-height: none !important; overflow: visible !important; border: none !important; border-radius: 0 !important; }
      #doc3 { padding: 15mm 18mm !important; font-size: 13px !important; }
      .page-break { page-break-before: always !important; border: none !important; color: transparent !important; margin: 0 !important; padding: 0 !important; height: 0 !important; }
      .btn-gen, .btn-pdf { display: none !important; }
    }

    /* ─── FLATPICKR OVERRIDES ─── */
    .flatpickr-input { cursor: pointer !important; }
    .flatpickr-calendar { direction:ltr; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#f0f0f0; }
    ::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }

    /* ─── LOGIN OVERLAY ─── */
    #loginOverlay {
      position:fixed; inset:0; z-index:9999;
      background: linear-gradient(160deg, var(--bg) 0%, var(--blue) 100%);
      display:flex; align-items:center; justify-content:center;
    }
    #loginOverlay.hidden { display:none; }
    .login-box {
      background:var(--white); border-radius:var(--radius); padding:40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35); text-align:center; max-width:380px; width:90%;
    }
    .login-box .logo-icon { margin:0 auto 18px; }
    .login-box h2 { color:var(--blue); font-size:1.3rem; margin-bottom:6px; }
    .login-box p  { color:var(--muted); font-size:.88rem; margin-bottom:22px; }
    .login-box input {
      width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
      font-size:1.05rem; text-align:center; letter-spacing:2px; direction:ltr;
      outline:none; transition:.2s;
    }
    .login-box input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,58,107,.12); }
    .login-box .login-btn {
      width:100%; margin-top:14px; padding:12px;
      background:linear-gradient(135deg, var(--blue), #2a5298);
      color:#fff; border:none; border-radius:10px; font-size:.95rem; font-weight:700;
      cursor:pointer; transition:.2s;
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div class="logo-icon">🔒</div>
    <h2>איתי ראובני</h2>
    <p>הכנס קוד גישה כדי להיכנס למערכת</p>
    <input id="loginCode" type="password" placeholder="קוד גישה" maxlength="20" onkeydown="if(event.key==='Enter')checkLogin()" />
    <button class="login-btn" onclick="checkLogin()">כניסה</button>
    <div class="login-err" id="loginErr" style="color:#e00;font-size:13px;margin-top:10px;"></div>
  </div>
</div>
<script>
function checkLogin(){
  var code=document.getElementById('loginCode').value.trim();
  if(code==='0547351024'){
    document.getElementById('loginOverlay').classList.add('hidden');
    try { sessionStorage.setItem('auth','1'); } catch(e){}
  } else {
    document.getElementById('loginErr').textContent='קוד שגוי, נסה שנית';
    document.getElementById('loginCode').value='';
  }
}
try {
  if(sessionStorage.getItem('auth')==='1'){
    document.getElementById('loginOverlay').classList.add('hidden');
  }
} catch(e){}
</script>

  <a href="index.html" class="logo">
    <div class="logo-icon">📋</div>

</header>

<section class="page active">
  <div class="editor-wrap">
    <!-- FORM -->
    <div class="form-panel">
      <h2>מילוי פרטי ההסכם</h2>
      <p class="fp-sub">הסכם מתן שירותים בין איתי ראובני ללקוח (המזמין)</p>

      <div class="sec-title">פרטי המזמין וההסכם (עמוד 1)</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/he.js"></script>
<script>
"use strict";

function g(id) { return document.getElementById(id); }
function v(id) { const el = g(id); return el ? el.value.trim() : ''; }
function fv(val, fallback) {
  if (!val) return `<span class="fv empty">${fallback || '___________'}</span>`;
  return `<span class="fv">${val}</span>`;
}

function hebDate(str) {
  if (!str) return null;
  const [y, m, d] = str.split('-');
  const mn = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${d} ב${mn[parseInt(m,10)]} ${y}`;
}

function displayDate(str) {
  if (!str) return null;
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

document.addEventListener('DOMContentLoaded', () => {
  flatpickr('#a3date', { locale: 'he', dateFormat: 'Y-m-d', allowInput: false, onChange: renderDoc });
  flatpickr('#a3sdate', { locale: 'he', dateFormat: 'Y-m-d', allowInput: false, onChange: renderDoc });
  flatpickr('#a3tstart', { enableTime: true, noCalendar: true, dateFormat: 'H:i', time_24hr: true, defaultHour: 9, onChange: renderDoc });
  flatpickr('#a3tend', { enableTime: true, noCalendar: true, dateFormat: 'H:i', time_24hr: true, defaultHour: 17, onChange: renderDoc });
  renderDoc();
});

function addCommas(num) {
  if(!num) return '';
  return Number(num).toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function renderDoc() {
  const dateStr = v('a3date');
  const dateFormatted = dateStr ? hebDate(dateStr) : null;
  const cname  = v('a3cname');
  const cid    = v('a3cid');
  const caddr  = v('a3caddr');
  
  const paddr  = v('a3paddr');
  const use    = v('a3use');
  const rooms  = v('a3rooms');
  const sdate  = displayDate(v('a3sdate'));
  const tstart = v('a3tstart');
  const tend   = v('a3tend');
  
  const crewNum   = v('a3crewNum');
  const crewMax   = v('a3crewMax') || 0;
  const crewPrice = v('a3crewExtra');
  const reqs      = v('a3reqs');
  
  const hours     = v('a3hours');
  const price     = v('a3price');
  const vatRate   = parseFloat(v('a3vat')) || 18;
  const extraBase = parseFloat(v('a3extraBase')) || 900;
  
  // Calculations
  const crewMaxTotal = (crewNum && crewMax) ? (parseInt(crewNum) + parseInt(crewMax)) : 'Y+4';
  const priceWithVat = price ? addCommas(parseFloat(price) * (1 + vatRate/100)) : '_______';
  const extra150     = addCommas(extraBase * 1.5);
  const formattedPrice = price ? addCommas(price) : 'A';
  const formattedExtraBase = addCommas(extraBase);

  g('doc3').innerHTML = `
<div class="doc-title">הסכם מתן שירותים</div>
<div style="margin-bottom: 20px; font-weight: 700;">שנערך ונחתם ביום ${fv(dateFormatted, '_______________')}</div>

<div style="text-align:center; font-weight:bold; margin-bottom:20px;">ב י ן</div>

<div style="text-align:center; margin-bottom: 20px;">
  מזמין <strong>${fv(cname, '____________________')}</strong><br>
  ת.ז <strong>${fv(cid, '____________________')}</strong><br>
  :בכתובת <strong>${fv(caddr, '____________________')}</strong><br>
  (להלן: "הלקוח")
  <div style="text-align:left; font-weight:bold; text-decoration:underline; margin-top:5px;">;מצד אחד</div>
</div>

<div style="text-align:center; font-weight:bold; margin-bottom:20px;">ל ב י ן</div>

<div style="text-align:center; margin-bottom: 30px;">
  <strong>איתי ראובני – <span style="letter-spacing:1px">LOCK AND ACTION</span></strong><br>
  ע.מ. 208777367<br>
  מרחוב שניר 112, כפר ורדים<br>
  (להלן: "ספק השירותים")
  <div style="text-align:left; font-weight:bold; text-decoration:underline; margin-top:5px;">;מצד שני</div>
</div>

<div class="clause"><strong>הואיל:</strong> וספק השירותים מציע ללקוחותיו שירותי איתור לוקיישנים ואובייקטים שונים לימי צילום, בהתאם לבקשת הלקוח, הכולל ליווי שוטף של הלקוח לרבות לימי הביקור וכן התקשרות בהסכם עם בעל הלוקיישן ו/או האובייקט כשלוח וכנציג מטעם הלקוח ("השירותים");</div>
<div class="clause"><strong>והואיל:</strong> והלקוח, הינו במאי אשר מעוניין לבצע שימוש בלוקיישן ו/או באובייקט כפי המפורט בנספח א' להסכם זה (להלן "הנכס") לצורך יום צילומים במסגרת ${fv(use, '___________')}, ולשם כך פנה לספק השירותים קבלת השירותים;</div>
<div class="clause"><strong>והואיל:</strong> והלקוח מעוניין לקבל מספק השירותים, וספק השירותים מעוניין לספק ללקוח, את השירותים (כהגדרתם להלן) בהתאם ובכפוף לתנאים ולמגבלות המפורטים בהסכם זה;</div>
<div class="clause" style="margin-bottom: 25px;"><strong>והואיל:</strong> וברצון הצדדים להסדיר את היחסים המשפטיים ביניהם, והכל כמפורט בהסכם זה;</div>

<div style="margin-bottom: 15px;"><strong>לפיכך הוצהר, הותנה והוסכם בין הצדדים כדלקמן:</strong></div>

<div class="clause"><strong>1. הגדרות ופרשנות</strong></div>
<div class="clause">1.1. חלוקתו של הסכם זה לסעיפים ומתן כותרות לסעיפים נעשו כמראי מקום בלבד, ואין להשתמש בהם לצרכי פרשנות.</div>
<div class="clause" style="margin-bottom: 15px;">1.2. המבוא להסכם זה מהווה חלק בלתי נפרד הימנו.</div>

<div class="clause"><strong>2. השירותים</strong></div>
<div class="clause">2.1. הלקוח מזמין בזאת מספק השירותים את השירותים (כהגדרתם להלן) בהתאם ובכפוף לתנאים ולמגבלות המפורטים בהסכם זה.</div>
<div class="clause">2.2. בחתימת הלקוח על הסכם זה, ממנה הלקוח את ספק השירותים כשלוח מטעמו וכנציגו החוקי להתקשר בהסכם עם בעל לוקיישן ו/או בעל האובייקט (לצורך הסכם זה יקרא כל בעל לוקיישן או בעל אובייקט להלן "בעל נכס") אשר יאושר על ידי הלקוח. מובהר ללקוח והוא מאשר כי כל טענה תביעה או דרישה שתהא לו למול בעל נכס, לרבות כל סכסוך או מחלוקת ביניהם, תופנה ישירות לבעל הנכס בהתאמה, ואינה באחריותו של ספק השירותים, לרבות כל טענה תביעה או דרישה שתהא לכל צד שלישי כנגד הלקוח בקשר עם השימוש שיבצע בנכס. הלקוח ישפה ויפצה את ספק השירותים בגין כל נזק אובדן או חיוב שיגרמו לו עקב תביעה או דרישה מאת צד שלישי, לרבות בעל נכס, שמקורה בשימוש בנכס או בכל הנוגע לו. נזק יכלול כל תשלום תקבול הוצאה או קנס אשר ספק השירותים יחויב בו.</div>
<div class="clause">2.3. ביטוח. הלקוח מתחייב לרכוש פוליסת ביטוח יעודית כמקובל בתעשיה ליום צילומים מהסוג האמור, עבור השימוש שיבצע בנכס כלשהו, בהתאם לסוג הנכס, אשר יכלול ביטוח צד ג' וחבות מעבידים. הלקוח ימציא לספק השירותים אישור על קיום ביטוחים כאמור בטרם התקשרותו של ספק השירותים עם בעל נכס. מובהר כי העברת העתק מהפוליסה לספק השירותים לא תהווה כל מחויבות או אחריות מצד ספק השירותים או לאישורו כי הפוליסה תקינה או מכסה כיסוי מינימלי כלשהו, וכי החזקת פוליסה כאמור בתוקף לכל אורך תקופת ההסכם הינה תנאי חובה להסכם זה.</div>
<div class="clause">2.4. הלקוח מתחייב כי לא יפנה ולא יקיים כל קשר עם בעל נכס אשר הופנה אליו על ידי ספק השירותים, ללא אישורו של ספק השירותים. בכל מקרה בו יתקשר הלקוח בעתיד עם כל בעל נכס שהופנה אליו על ידי ספק השירותים, יהא זכאי ספק השירותים לקבל את הסכום המפורט בסעיף התמורה שבהסכם זה.</div>
<div class="clause">2.5. עם איתור נכס מתאים עבור הלקוח, יחתום הלקוח על נספח יציאה לסיור בנוסח המצ"ב להלן כנספח ב' ויערך סיור מקדים בהשתתפות הלקוח, בו יוכל הלקוח לראות את הנכס. ככל והנכס יהיה לטעמו של הלקוח, ישלח הלקוח לספק השירותים הזמנה בכתב בנוסח המצ"ב כנספח ג' ("הזמנה"), אשר תכלול את מהות השימוש, המועד, משך הזמן, התכולה ודרישות נוספות ככל שישנן, חתומה על ידי הלקוח. לאחר קבלת הזמנה חתומה, יזמין ספק השירותים, כשלוח של הלקוח, את הנכס מבעל הנכס, ויעדכן את הלקוח כי ההזמנה בוצעה.</div>
<div class="clause">2.6. הלקוח מצהיר ומתחייב כי ידוע לו שכל שינוי שברצונו לבצע בהזמנה, לאחר ההתקשרות בין ספק השירותים לבין בעל נכס, חייב להיות מאושר מראש על ידי בעל הנכס, לרבות ביטול. בשום מקרה לא ניתן לבצע שינוי בהזמנה, שאינו לפחות 7 ימים בטרם המועד שנקבע לשימוש בנכס.</div>
<div class="clause" style="margin-bottom: 15px;">2.7. מובהר ללקוח כי כל סטיה או אי התאמה שתהיה בנכס ביחס להזמנה, תיפתר בין הלקוח ובעל הנכס בלבד, למעט אם מקורה ברשלנותו של ספק השירותים או בזדון.</div>

<div class="clause"><strong>3. הצהרות הצדדים</strong></div>
<div class="clause">3.1. כל צד מצהיר כי אין מניעה או הגבלה חוזית חוקית או אחרת להתקשרותו בהסכם זה.</div>
<div class="clause">3.2. הלקוח יבצע את פעילותו בנכס תוך שמירה על הוראות הדין, ויקפיד לשמור על הנכס וכל הרכוש הנמצא בו שמירה קפדנית ולהחזירו בתום הפעילות במצב זהה לזה שקיבלו. ככל ונגרם נזק כלשהו לנכס, ידווח הלקוח לספק השירותים על הנזק האמור. כל נזק אובדן או חיוב שיגרם לנכס, כאשר היה בידיו של הלקוח, יהיו באחריותו ועל חשבונו.</div>
<div class="clause">3.3. הלקוח מצהיר ומתחייב כי במסגרת השימוש בנכס, לא תבוצע כל פעילות אשר הינה בניגוד לדין לרבות אך לא רק, ניצול בקטינים, פורנוגרפיה, הלבנת כספים, עיסוק או מכירת חומרי נפץ ונשק וכיו"ב.</div>
<div class="clause">3.4. הלקוח מצהיר כי התמורה בגין השימוש בנכס תשולם לבעל הנכס בין אם הופיע הלקוח במועד הקבוע בהזמנה, ובין אם לאו.</div>
<div class="clause" style="margin-bottom: 15px;">3.5. ספק השירותים מתחייב למלא את חובותיו והתחייבויותיו על-פי הסכם זה במקצועיות, במומחיות ובמיומנות.</div>

<div class="clause"><strong>4. התמורה</strong></div>
<div class="clause">4.1. בגין השימוש בנכס וביצוע השירותים על ידי ספק השירותים על פי הסכם זה, ישלם הלקוח לספק השירותים את התמורה כפי המפורט בנספח א' ("התמורה"). התמורה תשולם לספק השירותים, עם שליחת טופס ההזמנה על ידי ספק השירותים. לכל הסכומים יצורף מע"מ כדין.</div>
<div class="clause">4.2. מובהר ללקוח והוא מאשר כי עלות סיור לבדיקת והכרת הנכס הינה 400 ₪ אשר ישולמו לספק השירותים במועד הסיור, בין אם יחליט הלקוח שהנכס לשביעות רצונו, ובין אם לאו. סכום זה הינו בנוסף לסכום התמורה.</div>
<div class="clause">4.3. ביטול או שינוי מועד של הזמנת שימוש בנכס תתבצע לפחות 7 ימים מראש. ויתכן ויתווספו תנאים נוספים לביטול בהתאם לדרישות כל בעל נכס, אשר יובאו לידיעת הלקוח. ככל וניתן לבטל את הזמנת השימוש בנכס מול בעל הנכס, אזי יזכה ספק השירותים את הלקוח בניכוי עמלה שתידרש על ידי בעל הנכס וכן עמלה של 2,500 ₪ בגין השירותים שביצע. ככל ולא ניתן יהיה לבטל את הזמנת הנכס, יחויב הלקוח במלוא העלות.</div>
<div class="clause">4.4. כל הזמנה נוספת בעתיד של שימוש בנכס על ידי הלקוח מבעל הנכס, תזכה את ספק השירותים בסכום של 10,000 ₪ בגין כל הזמנה כאמור. הלקוח מתחייב לעדכן את ספק השירותים בגין הזמנות עתידיות כאמור.</div>
<div class="clause" style="margin-bottom: 15px;">4.5. ככל וירצה הלקוח להזמין שימוש בנכסים נוספים באמצעות ספק השירותים בעתיד, התמורה תעודכן בהתאם לכל נכס שיזמין, והפרוצדורה תישאר זהה לזו המפורטת בהסכם זה.</div>

<div class="clause"><strong>5. תקופת ההסכם</strong></div>
<div class="clause">5.1. תקופת ההתקשרות בין הצדדים תחל ביום חתימת הסכם זה ותהא בתוקף עד לסיום השימוש בנכס והחזרתו לבעל הנכס (להלן: "תקופת ההסכם").</div>
<div class="clause" style="margin-bottom: 15px;">5.2. כל צד יהיה רשאי להפסיק את ההתקשרות בהסכם זה, במידה והפר הצד השני את הסכם זה הפרה מהותית, ולא תיקן את ההפרה בתוך 14 ימים ממועד קבלת הודעה בכתב מהצד הניפר באמצעות דואר אלקטרוני, אודות ההפרה.</div>

<div class="clause"><strong>6. סודיות</strong></div>
<div class="clause" style="margin-bottom: 15px;">כל צד מצהיר ומתחייב כי במשך תקופת ההתקשרות וכן לאחריה (ללא הגבלת זמן), הוא ישמור בסודיות מוחלטת ולא יבצע כל שימוש בכל מידע או ידיעות הקשורים, במישרין או בעקיפין, לעסקיו ו/או פעילותו של הצד השני, וכל מידע הקשור אליו ו/או לחוג לקוחותיו ו/או ספקיו, ו/או לעסקים הקשורים בצורה כלשהי לצד השני, לרבות מידע או ידע טכני, עסקי, כלכלי, מסחרי או אחר, לרבות סכומי התשלום ששולמו לספק השירותים ו/או מידע אשר הגיע אליו ו/או לרשותו במהלך או עקב התקשרותו בהסכם זה ולרבות תוכן הסכם זה, למעט מידע אשר הינו בנחלת הכלל ו/או אשר היה בידיעתו של אותו צד בטרם ההתקשרות בהסכם זה, ו/או אשר התגלה לו שלא במסגרת הסכם זה. כמו כן מתחייב הלקוח כי ישמור בסוד ולא יגלה כל מידע סודי השייך לבעל הנכס או שהתגלה לו במסגרת השימוש בנכס.</div>

<div class="clause"><strong>7. היעדר אחריות</strong></div>
<div class="clause">7.1. ספק השירותים אינו מספק כל מצג או התחייבות ללקוח בקשר עם טיב הנכס, ההנאה ממנו, התאמתו ללקוח או לצרכיו, גודלו איכותו או מיקומו, וכל מידע אשר יספק ללקוח הינו בהתאם לידיעתו בלבד, לא נבדק ואינו ודאי. באחריות הלקוח לוודא את התאמת הנכס למטרותיו ולדרישותיו בסיור שיערוך בנכס בטרם יאשר לספק השירותים להתקשר עם בעל הנכס בהסכם, לשאול את כל השאלות ולקבל את כל התשובות לשביעות רצונו המלאה. הלקוח יאשר בכתב לספק השירותים להתקשר כשלוחו עם בעל הנכס, בנוסח המצ"ב להלן כנספח ג'.</div>
<div class="clause">7.2. ידוע ללקוח והוא מאשר כי אין בשירותים הניתנים לו על פי הסכם זה, משום ערובה או התחייבות של ספק השירותים להשגת מינימום הכנסות או מינימום רווחים או הכנסה מינימלית כלשהו, ולא יהיו ללקוח כל טענות תביעות או דרישות מספק השירותים או מי מטעמו, בכל עניין הנוגע לאמור בסעיף זה, לרבות במקרה של הפסד שיגרם ללקוח עקב השירותים או כתוצאה מיישום כל המלצה או מסקנה הנובעת מהם.</div>
<div class="clause" style="margin-bottom: 15px;">7.3. ספק השירותים ו/או מי מטעמו לא יהיה אחראי בשום מקרה לנזקים שיגרמו ללקוח ו/או ללקוחותיו של הלקוח, ספקיו עובדיו או למי מטעמו בקשר עם השירותים על פי הסכם זה לרבות לנזקים ישירים, עקיפים תוצאתיים או נסיבתיים או כל נזק אחר מכל מין וסוג שהוא הנובעים או הקשורים לביצוע השירותים על פי הסכם זה, לשירותים שיספק הלקוח ללקוחותיו, לאספקה או לאי-אספקה של שירותים או לכל מעשה או מחדל אחר של ספק השירותים, בין שהדבר מבוסס על חוזה, ובין על דיני נזיקין, אחריות מוחלטת או כל דבר אחר היום או בעתיד. בכל מקרה תהא אחריותו של ספק השירותים במסגרת ההתקשרות בין הצדדים מוגבלת למחצית מסכום התמורה אשר שולמה לספק השירותים בפועל מהלקוח.</div>

<div class="clause"><strong>8. שונות</strong></div>
<div class="clause">8.1. ספק השירותים מצהיר, כי ידוע לו שהסכם זה הינו הסכם למתן השירותים בלבד, ואין בו כדי ליצור בינו לבין הלקוח יחסי עובד-מעביד ואין הוא מקנה לו זכויות כלשהן מלבד אלה המפורטות בהסכם זה.</div>
<div class="clause">8.2. הסכם זה מבטא את כל ההסכמות באופן מלא וממצה בין הצדדים לגבי הנושאים או העניינים הנדונים בו, והוא מחליף ומבטל כל מצג, הסכם, משא ומתן, נוהג, זיכרון דברים, הצעות, סיכומי דיון, מכתבי כוונות ו/או התחייבות, וכל מסמך אחר, ששררו או שהוחלפו בין הצדדים (בין בכתב ובין בעל-פה) בנושאים או בעניינים האמורים, עובר לחתימתו של הסכם זה.</div>
<div class="clause">8.3. כל שינוי או ביטול של הוראה מהוראות הסכם זה ייעשה בכתב ובחתימת הצדדים.</div>
<div class="clause" style="margin-bottom: 25px;">8.4. הודעות בקשר להסכם זה תשלחנה בדואר רשום או בדואר אלקטרוני או תימסרנה ביד על-פי מעני הצדדים הנקובים במבוא להסכם זה (או כל מען אחר עליו תבוא הודעה מתאימה בכתב), ויראו כל הודעה כאמור כאילו נמסרה לנמענה במוקדם שבין המועדים הבאים: עם מסירתה בפועל (או הצעתה לנמען במקרה של סירוב לקבלה), או עם עבור יום עסקים אחד ממועד שיגורה בדואר אלקטרוני, או שלושה (3) ימי עסקים מהמועד בו נמסרה למשלוח בדואר רשום, למעט הודעה בדבר שינוי מען אשר יראוה כנמסרת רק עם מסירתה בפועל לידי הנמען.</div>

<div class="clause">השימוש אשר יערך בנכס הינו כדלהלן: <span class="fv">${use || '____________________'}</span>.</div>

<div class="clause" style="margin-top: 10px;">

</div>

<div class="clause" style="line-height:2.2; margin-top: 10px;">

בגין שעה נוספת יחויב הלקוח בסכום של ${fv(formattedExtraBase, '900')} ₪ ולאחר חריגה בשעה הראשונה יחויב בקנס של 150% כלומר ${fv(formattedExtraBase, '900')} X 150% = <span dir="ltr">${fv(extra150, '1,200')}</span> ₪ + מע"מ.

</div>

<div class="clause" style="margin-top: 10px;">
בכל מקרה של נזק אובדן או חיוב שיגרם לנכס במסגרת השימוש בו על ידי הלקוח, ישפה ויפצה הלקוח את בעל הנכס בסכום השווה לערכו של הנזק, לרבות כל ההוצאות הנלוות לו, הכוללות בין היתר כל נזק שיגרם לתכולתו וכיו"ב. ככל שיפעיל בעל הנכס את חברת הביטוח שלו, ישא הלקוח בכל הוצאות שיגרמו לבעל הנכס לרבות סכום ההשתתפות העצמית, אובדן הערך וכיו"ב.

</div>

<div class="clause" style="margin-top: 10px;">
